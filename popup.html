<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gemini Cleaner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Icon" class="logo">
    <h1>Gemini Cleaner</h1>
  </div>
  
  <div class="content">
    <div class="setting-row">
      <div class="setting-info">
        <span class="setting-title">Hide Ads</span>
        <span class="setting-desc">Remove "Upgrade to Ultra" prompts</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="blockerToggle">
        <span class="slider round"></span>
      </label>
    </div>
  </div>

  <footer class="sidebar-footer">
    <p class="donation-text">Developed for free. Even a small $3 pizza slice helps keep this tool alive!</p>
    <a href="https://ko-fi.com/incconutwo" target="_blank" class="bmc-btn">
      <span class="bmc-icon">🍕</span> <span class="bmc-text">Buy a pizza slice</span>
    </a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
